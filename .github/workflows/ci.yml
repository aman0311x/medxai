name: Continuous Integration

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch numpy opencv-python-headless scikit-image matplotlib pytest pytest-cov black isort

      - name: Check Code Formatting (Black)
        run: |
          black --check .

      - name: Check Import Order (isort)
        run: |
          isort --check-only .

      - name: Run Automated Tests & Generate Coverage Report
        run: |
          python -m pytest tests/ -v --cov=medxai --cov-report=term --cov-report=xml